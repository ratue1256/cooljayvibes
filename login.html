<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - CoolJayVibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2997FF", "background-dark": "#000000", "card-dark": "#1C1C1E", "card-border": "#2C2C2E", "text-primary": "#F5F5F7", "text-secondary": "#86868B",
                    },
                    fontFamily: {
                        "display": ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
                        "body": ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .apple-card {
            background: #1C1C1E;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
    </style>
</head>

<body class="bg-background-dark text-text-primary font-body antialiased flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-6">
        <a href="index.html" class="flex items-center justify-center gap-2 mb-12">
            <div class="flex items-center justify-center size-8 bg-white text-black rounded-full">
                <span class="material-symbols-outlined text-[20px] font-bold">bolt</span>
            </div>
            <h2 class="text-xl font-semibold tracking-tight text-white">CoolJayVibe</h2>
        </a>

        <div class="apple-card rounded-[2.5rem] p-10 backdrop-blur-3xl shadow-2xl">
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2 text-center">Sign in</h1>
            <p class="text-sm text-text-secondary text-center mb-10">Access your saved configurations.</p>

            <form class="flex flex-col gap-4">
                <div class="relative">
                    <input type="email" placeholder="Email or Username"
                        class="w-full bg-[#2C2C2E] border border-transparent focus:border-white/20 text-white text-sm px-5 py-4 rounded-2xl focus:outline-none placeholder:text-gray-500 transition-all font-medium" />
                </div>
                <div class="relative">
                    <input type="password" placeholder="Password"
                        class="w-full bg-[#2C2C2E] border border-transparent focus:border-white/20 text-white text-sm px-5 py-4 rounded-2xl focus:outline-none placeholder:text-gray-500 transition-all font-medium" />
                </div>

                <button
                    class="bg-primary hover:bg-[#47a5ff] text-white py-4 rounded-2xl font-bold transition-all mt-4 transform active:scale-95 shadow-lg shadow-primary/20">
                    Continue
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="#" class="text-primary hover:underline text-sm font-medium">Forgotten your password?</a>
            </div>
        </div>
    </div>
</body>

</html>
