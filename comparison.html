<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Deep Comparison - CoolJayVibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2997FF", "background-dark": "#000000", "card-dark": "#1C1C1E", "card-border": "#2C2C2E", "text-primary": "#F5F5F7", "text-secondary": "#86868B",
                    },
                    fontFamily: {
                        "display": ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
                        "body": ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .apple-card {
            background: #1C1C1E;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-gradient-subtle {
            background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    
        /* Auto Translate Hiding */
        body { top: 0px !important; }
        .skiptranslate { display: none !important; }
        .goog-te-banner-frame { display: none !important; }
        .goog-tooltip { display: none !important; }
        .goog-tooltip:hover { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
        #google_translate_element { display: none !important; }
    </style>
</head>

<body class="bg-background-dark text-text-primary font-body antialiased overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col max-w-[1240px] mx-auto p-4 md:p-10 lg:p-16 gap-10">
        <header
            class="flex items-center justify-between py-3 sticky top-6 z-50 bg-background-dark/70 backdrop-blur-md border border-white/10 px-6 rounded-full mx-[-1rem] md:mx-0 shadow-2xl">
            <a href="index.html" class="flex items-center gap-2">
                <div class="flex items-center justify-center size-7 bg-white text-black rounded-full">
                    <span class="material-symbols-outlined text-[18px] font-bold">bolt</span>
                </div>
                <h2 class="text-lg font-semibold tracking-tight text-white">CoolJayVibe</h2>
            </a>
        </header>

        <main class="flex-grow mt-6">
            <div class="text-center mb-16">
                <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4 text-gradient-subtle leading-tight">
                    Pixel 10 Pro vs iPhone 17
                </h1>
                <p class="text-text-secondary text-lg">The clash of the titans mapped cell-by-cell.</p>
            </div>

            <div
                class="apple-card rounded-[2.5rem] p-4 overflow-hidden border border-white/10 mb-20 shadow-2xl shadow-primary/5">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr>
                            <th class="p-6 border-b border-white/10 w-1/3 text-text-secondary text-sm font-medium">Spec
                            </th>
                            <th class="p-6 border-b border-white/10 w-1/3 text-white font-bold text-center">Pixel 10 Pro
                            </th>
                            <th class="p-6 border-b border-white/10 w-1/3 text-white font-bold text-center">iPhone 17
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="p-6 border-b border-white/5 font-medium text-text-secondary">Processor</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium">Tensor G5 (TSMC 3nm)</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium">A19 Pro (TSMC 2nm)</td>
                        </tr>
                        <tr>
                            <td class="p-6 border-b border-white/5 font-medium text-text-secondary">Camera Base</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium text-green-400">50MP
                                Quad-Pixel (AI Enhanced)</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium">48MP Tri-lens (Sensor Shift)
                            </td>
                        </tr>
                        <tr>
                            <td class="p-6 border-b border-white/5 font-medium text-text-secondary">OS Lock-in</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium text-green-400">Open
                                Ecosystem</td>
                            <td class="p-6 border-b border-white/5 text-center font-medium text-red-400">Closed
                                Ecosystem</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-center">
                <button
                    class="bg-primary hover:bg-[#47a5ff] text-white px-10 py-4 rounded-full font-semibold text-base transition-all transform active:scale-95 shadow-2xl">
                    Generate Custom Match
                </button>
            </div>
        </main>
    </div>

    <!-- Language Script -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentLang = localStorage.getItem('cooljay_lang');
            
            if (!currentLang) {
                const userLang = navigator.language || navigator.userLanguage;
                const baseLang = userLang.split('-')[0];
                const supportedLangs = ['en', 'fr', 'de', 'it', 'es', 'pt', 'nl', 'sv', 'pl', 'zh'];
                currentLang = supportedLangs.includes(baseLang) ? baseLang : 'en';
                
                if (currentLang !== 'en') {
                    const gLang = currentLang === 'zh' ? 'zh-CN' : currentLang;
                    document.cookie = `googtrans=/en/${gLang}; path=/`;
                }
                localStorage.setItem('cooljay_lang', currentLang);
                if (currentLang !== 'en') {
                    location.reload();
                }
            }

            const displayLang = currentLang === 'zh-CN' || currentLang === 'zh' ? 'ZH' : currentLang.toUpperCase();
            const displayElement = document.getElementById('current-lang-display');
            if (displayElement) displayElement.innerText = displayLang;

            document.querySelectorAll('.lang-switch').forEach(btn => {
                const btnLang = btn.dataset.lang;
                if (btnLang === currentLang || (currentLang === 'zh' && btnLang === 'zh-CN')) {
                    btn.classList.remove('text-text-secondary');
                    btn.classList.add('text-white', 'font-bold');
                    btn.innerHTML += '<span class="material-symbols-outlined text-[16px] ml-2">check</span>';
                }

                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Prevent bubbling up
                    e.stopPropagation();
                    
                    const targetLang = e.currentTarget.dataset.lang;
                    
                    if(targetLang === 'en') {
                        document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        document.cookie = `googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=.${location.hostname}; path=/;`;
                    } else {
                        document.cookie = `googtrans=/en/${targetLang}; path=/`;
                        document.cookie = `googtrans=/en/${targetLang}; domain=.${location.hostname}; path=/`;
                    }
                    
                    localStorage.setItem('cooljay_lang', targetLang);
                    location.reload();
                });
            });
            
            // Also close the dropdown when language selected or clicked outside
            document.addEventListener('click', (e) => {
                if(!e.target.closest('.group')) {
                    // It's using hover, so clicking outside isn't strictly necessary for CSS hide 
                    // but on mobile it helps
                }
            });
        });
    </script>
</body>

</html>
